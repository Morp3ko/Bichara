<!DOCTYPE html>
<html>
    <head>
        <title>..:Basic HTML Layout:..</title>
        <style type="text/css">
            .wrapper {
                background-color: #CCCCCC;
            }
            .header {
                background-color: rgb(149, 149, 240);
                height: 200px;
                color: white;
            }
            .body {
                min-height: 200px;
                color: white;
            }
            .navigation {
                background-color: rgb(200, 143, 143);
                width: 25%;
                height: 200px;
                float: left;
            }
            .content {
                background-color: rgb(127, 226, 127);
                width: 75%;
                height: 200px;
                float: right;
            }
            .footer {
                background-color: gray;
                height: 100px;
            }
        </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="header">
                header
            </div>
            <div class="body">
                <div class="navigation">navigation</div>
                <div class="content">content</div>
            </div>
            <div class="footer">footer</div>
        </div>
    </body>
</html>
